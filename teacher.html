<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard - Station</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <script defer src="script.js"></script>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-5">
    <h2 class="text-center mb-4">Teacher Dashboard</h2>
    <div class="mb-3">
      <h4>Create a New Classroom</h4>
      <form method="POST" action="/create-classroom">
        <div class="mb-3">
          <label for="classroom-name" class="form-label">Classroom Name</label>
          <input type="text" id="classroom-name" name="classroomName" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="student-limit" class="form-label">Maximum Students</label>
          <input type="number" id="student-limit" name="studentLimit" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Classroom</button>
      </form>
    </div>
    <hr>
    <h4>Existing Classrooms</h4>
    <ul class="list-group">
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Classroom Name
        <button class="btn btn-danger btn-sm">Delete</button>
      </li>
      <!-- Repeat as necessary -->
    </ul>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
